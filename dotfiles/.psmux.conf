# psmux config (tmux-compatible, no TPM plugins)
# mirrors .tmux.conf without plugin dependencies

# core ----------------------------------------

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
bind , command-prompt "rename-window '%%'"

setw -g mode-keys vi
bind Space copy-mode

bind r source-file ~/.psmux.conf

# status bar ----------------------------------

set -g status-interval 1
set -g status on

set -g status-justify left

set -g status-style bg=black,fg=white,none

# panes ---------------------------------------

set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=cyan
set -g display-panes-colour brightblack
set -g display-panes-active-colour cyan

# clock ---------------------------------------

setw -g clock-mode-colour cyan

# messages ------------------------------------

set -g message-style fg=cyan,bg=black
set -g message-command-style fg=cyan,bg=black

# status left/right ---------------------------

set -g status-left "#[fg=white,bg=blue] #S#[fg=blue,bg=black]"
set -g status-right "#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %Y-%m-%d #[fg=black,bg=brightblack,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %H:%M #[fg=black,bg=brightblack,nobold,noitalics,nounderscore]#[fg=cyan,bg=black,nobold,noitalics,nounderscore]#[fg=black,bg=cyan] #H "

# windows -------------------------------------

set -g window-status-format '#[fg=black,bg=brightblack,nobold,noitalics,nounderscore] #[fg=white,bg=brightblack]#I #[fg=black,bg=brightblack,nobold,noitalics,nounderscore] #[fg=white,bg=brightblack]#(pwd="#{pane_current_path}"; echo ${pwd####*/} \|) #W #[fg=brightblack,bg=black,nobold,noitalics,nounderscore]'
set -g window-status-current-format '#[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#I #[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#(pwd="#{pane_current_path}"; echo ${pwd####*/} \|) #W #F #[fg=cyan,bg=black,nobold,noitalics,nounderscore]'
set -g window-status-separator ""
